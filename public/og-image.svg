<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#111111"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a68b4b"/>
      <stop offset="50%" style="stop-color:#c9a962"/>
      <stop offset="100%" style="stop-color:#d4b978"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)"/>
  
  <!-- Decorative lines -->
  <line x1="100" y1="315" x2="250" y2="315" stroke="url(#gold)" stroke-width="1" opacity="0.5"/>
  <line x1="950" y1="315" x2="1100" y2="315" stroke="url(#gold)" stroke-width="1" opacity="0.5"/>
  
  <!-- Star symbol -->
  <text x="600" y="250" font-family="Georgia, serif" font-size="24" fill="#c9a962" text-anchor="middle">✦</text>
  
  <!-- Main Title -->
  <text x="600" y="340" font-family="Georgia, serif" font-size="72" fill="#f5f5f5" text-anchor="middle" letter-spacing="12">LA CASA VIVA</text>
  
  <!-- Subtitle -->
  <text x="600" y="400" font-family="Arial, sans-serif" font-size="18" fill="#888888" text-anchor="middle" letter-spacing="8">PREMIUM NIGHTLIFE EXPERIENCES • CASABLANCA</text>
  
  <!-- Bottom decorative element -->
  <rect x="550" y="480" width="100" height="1" fill="url(#gold)" opacity="0.6"/>
</svg>
