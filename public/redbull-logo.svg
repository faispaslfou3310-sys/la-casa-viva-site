<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="sunGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE135"/>
      <stop offset="100%" style="stop-color:#F5B800"/>
    </linearGradient>
  </defs>
  
  <!-- Sun -->
  <ellipse cx="200" cy="70" rx="45" ry="40" fill="url(#sunGradient)"/>
  
  <!-- Left Bull -->
  <g fill="#E11937">
    <!-- Body -->
    <path d="M50,95 Q30,85 25,70 Q22,60 30,55 L45,60 Q50,55 55,58 L60,70 Q55,80 50,85 Z"/>
    <path d="M55,58 Q70,45 90,50 Q110,55 120,70 Q130,85 125,100 Q120,115 100,120 L60,115 Q45,110 50,95 Z"/>
    <!-- Legs -->
    <path d="M60,115 L55,140 L62,142 L70,120"/>
    <path d="M85,118 L82,145 L90,147 L95,120"/>
    <!-- Tail -->
    <path d="M25,70 Q15,65 10,75 Q5,85 15,90" stroke="#E11937" stroke-width="4" fill="none"/>
    <!-- Horn -->
    <path d="M30,55 Q20,45 25,35 Q30,40 35,50"/>
  </g>
  
  <!-- Right Bull (mirrored) -->
  <g fill="#E11937" transform="translate(400,0) scale(-1,1)">
    <!-- Body -->
    <path d="M50,95 Q30,85 25,70 Q22,60 30,55 L45,60 Q50,55 55,58 L60,70 Q55,80 50,85 Z"/>
    <path d="M55,58 Q70,45 90,50 Q110,55 120,70 Q130,85 125,100 Q120,115 100,120 L60,115 Q45,110 50,95 Z"/>
    <!-- Legs -->
    <path d="M60,115 L55,140 L62,142 L70,120"/>
    <path d="M85,118 L82,145 L90,147 L95,120"/>
    <!-- Tail -->
    <path d="M25,70 Q15,65 10,75 Q5,85 15,90" stroke="#E11937" stroke-width="4" fill="none"/>
    <!-- Horn -->
    <path d="M30,55 Q20,45 25,35 Q30,40 35,50"/>
  </g>
  
  <!-- RED BULL Text -->
  <text x="200" y="185" font-family="Arial Black, Arial, sans-serif" font-size="36" font-weight="900" fill="#E11937" text-anchor="middle" letter-spacing="2">RED BULL</text>
  
  <!-- Registered trademark -->
  <circle cx="355" cy="55" r="8" stroke="#E11937" stroke-width="1.5" fill="none"/>
  <text x="355" y="60" font-family="Arial" font-size="12" fill="#E11937" text-anchor="middle">R</text>
</svg>
